<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPTAKU - 凛 (Rin) Japanese Tutor</title>
<script src="https://unpkg.com/@rive-app/canvas@2.36.0"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }

  #character-area { position: relative; height: 300px; background: #16213e; display: flex; align-items: center; justify-content: center; }
  #rive-canvas { width: 280px; height: 280px; }
  #char-name { position: absolute; top: 10px; left: 14px; background: rgba(128,0,128,0.6); padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
  #status-bar { background: rgba(0,0,0,0.6); padding: 4px 12px; font-size: 11px; font-family: monospace; position: absolute; bottom: 0; left: 0; right: 0; }
  #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

  #chat-area { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin: 6px 0; padding: 10px 14px; border-radius: 16px; max-width: 75%; word-wrap: break-word; }
  .msg.user { background: #6b21a8; margin-left: auto; }
  .msg.bot { background: #374151; }
  .msg .replay { font-size: 11px; color: #c084fc; cursor: pointer; margin-top: 4px; }

  #input-area { background: #1e293b; padding: 12px; display: flex; gap: 8px; }
  #input-area input { flex: 1; padding: 10px 16px; border-radius: 24px; border: 1px solid #4b5563; background: #111827; color: #eee; font-size: 15px; outline: none; }
  #input-area button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #7c3aed; color: white; font-size: 18px; cursor: pointer; }
  #input-area button:disabled { background: #4b5563; cursor: wait; }

  #debug { position: absolute; top: 10px; right: 14px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-family: monospace; max-width: 250px; }
</style>
</head>
<body>

<div id="character-area">
  <canvas id="rive-canvas" width="560" height="560"></canvas>
  <div id="char-name">凛 (Rin)</div>
  <div id="debug">Loading...</div>
  <div id="status-bar"><span id="status-dot" style="background:#f00"></span><span id="status-text">Initializing...</span></div>
</div>

<div id="chat-area"></div>

<div id="input-area">
  <input id="chat-input" type="text" placeholder="Type a message in Japanese..." autofocus>
  <button id="send-btn" onclick="sendMessage()">▶</button>
</div>

<script>
const API_URL = 'http://localhost:8080';
const WS_URL = 'ws://localhost:8765';

let riveInstance = null;
let riveInputs = {};
let ws = null;
let currentAudio = null;

// ── Rive Setup ──────────────────────────────────────────────────────────

async function initRive() {
  const r = new rive.Rive({
    src: '/assets/facial_expression.riv',
    canvas: document.getElementById('rive-canvas'),
    autoplay: true,
    stateMachines: 'State Machine 1',
    onLoad: () => {
      r.resizeDrawingSurfaceToCanvas();
      const inputs = r.stateMachineInputs('State Machine 1');
      const debug = [];
      if (inputs) {
        inputs.forEach(input => {
          riveInputs[input.name] = input;
          debug.push(input.name);
        });
      }
      document.getElementById('debug').textContent = `Inputs: ${debug.join(', ')}`;
      setStatus('Rive loaded', true);
      connectWS();
    },
    onLoadError: (e) => {
      document.getElementById('debug').textContent = `Rive error: ${e}`;
    }
  });
  riveInstance = r;
}

// ── BlendShape → Rive Mapping ───────────────────────────────────────────

function mapBlendShapes(bs) {
  const jaw = bs.JawOpen || 0;
  const smileL = bs.MouthSmileLeft || 0;
  const smileR = bs.MouthSmileRight || 0;
  const smile = (smileL + smileR) / 2;
  const frownL = bs.MouthFrownLeft || 0;
  const frownR = bs.MouthFrownRight || 0;
  const frown = (frownL + frownR) / 2;
  const browUp = bs.BrowInnerUp || 0;
  const browOuterUp = ((bs.BrowOuterUpLeft || 0) + (bs.BrowOuterUpRight || 0)) / 2;
  const browDown = ((bs.BrowDownLeft || 0) + (bs.BrowDownRight || 0)) / 2;
  const eyeWide = ((bs.EyeWideLeft || 0) + (bs.EyeWideRight || 0)) / 2;

  const mapped = {};

  // JcToon: Happy, Sad, Surprised, Angry (0-100)
  if (riveInputs['Happy']) mapped['Happy'] = clamp((smile + jaw * 0.3) * 500, 0, 100);
  if (riveInputs['Sad']) mapped['Sad'] = clamp(frown * 400, 0, 100);
  if (riveInputs['Surprised']) mapped['Surprised'] = clamp((browUp + browOuterUp + eyeWide + jaw * 0.8) * 200, 0, 100);
  if (riveInputs['Angry']) mapped['Angry'] = clamp(browDown * 500, 0, 100);

  // Talking Avatar: mouth hight, mouth witdh, kelopakmata
  if (riveInputs['mouth hight']) mapped['mouth hight'] = clamp(jaw * 150, 0, 100);
  if (riveInputs['mouth witdh']) {
    const funnel = bs.MouthFunnel || 0;
    const pucker = bs.MouthPucker || 0;
    mapped['mouth witdh'] = clamp((smile * 200 + funnel * 100 - pucker * 50) + 50, 0, 100);
  }
  if (riveInputs['kelopakmata f Slider']) {
    const blink = ((bs.EyeBlinkLeft || 0) + (bs.EyeBlinkRight || 0)) / 2;
    mapped['kelopakmata f Slider'] = clamp(blink * 300, 0, 100);
  }

  return mapped;
}

function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

function applyToRive(mapped) {
  for (const [name, value] of Object.entries(mapped)) {
    if (riveInputs[name]) {
      riveInputs[name].value = value;
    }
  }
}

// ── WebSocket ───────────────────────────────────────────────────────────

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('Connected', true);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'chat_response') {
      setStatus(`Playing audio + animation (${data.n_frames} frames)...`, true);
      playAudio(API_URL + data.audio_url);
    } else if (data.type === 'frame') {
      const mapped = mapBlendShapes(data.blendshapes);
      applyToRive(mapped);

      if (data.index % 15 === 0) {
        const active = Object.entries(mapped).filter(([,v]) => v > 1).map(([k,v]) => `${k}=${v.toFixed(0)}`).join(', ');
        setStatus(`Frame ${data.index} | ${active}`, true);
      }
    } else if (data.type === 'end') {
      setStatus('Done', true);
      // Reset expressions
      setTimeout(() => {
        for (const input of Object.values(riveInputs)) {
          if (typeof input.value === 'number') input.value = 0;
        }
      }, 500);
    }
  };

  ws.onclose = () => {
    setStatus('WS disconnected, reconnecting...', false);
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    setStatus('WS error', false);
  };
}

// ── Audio ───────────────────────────────────────────────────────────────

function playAudio(url) {
  if (currentAudio) currentAudio.pause();
  currentAudio = new Audio(url);
  currentAudio.play();
}

// ── Chat ────────────────────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage(text, 'user');
  setStatus('Thinking...', true);
  document.getElementById('send-btn').disabled = true;

  try {
    const resp = await fetch(API_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    addMessage(data.text, 'bot', API_URL + data.audio_url);
  } catch (e) {
    addMessage('Error: ' + e.message, 'bot');
    setStatus('Error', false);
  }
  document.getElementById('send-btn').disabled = false;
}

function addMessage(text, type, audioUrl) {
  const chat = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  if (audioUrl) {
    const replay = document.createElement('div');
    replay.className = 'replay';
    replay.textContent = '🔊 Replay';
    replay.onclick = () => playAudio(audioUrl);
    div.appendChild(replay);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Enter key
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// ── Status ──────────────────────────────────────────────────────────────

function setStatus(text, ok) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = ok ? '#0f0' : '#f00';
}

// ── Init ────────────────────────────────────────────────────────────────
initRive();
</script>
</body>
</html>
